codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: "70%"
        threshold: "5%"
        if_ci_failed: error
    patch:
      default:
        target: "50%"
        if_ci_failed: error

comment:
  layout: "reach,diff,flags,tree,footer"
  behavior: default
  require_changes: false

ignore:
  - "tests/"
  - "benchmarks/"
  - "docs/"
  - "setup.py"
  - "build.rs"
  - "src/python/teehistorian_py/chunks.py"
  - "src/python/teehistorian_py/protocols.py"

flags:
  unittests:
    paths:
      - "src/python/teehistorian_py/"
